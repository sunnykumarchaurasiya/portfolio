<!DOCTYPE html>
<html>
<head>
<title>Complete Form Validation</title>
<style>
    /* Page Center */
body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, darkblue, #764ba2);
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* Form Container */
form {
    width: 400px;
    background: #ffffff;
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

/* Heading */
h1 {
    text-align: center;
    color: #333;
    margin-bottom: 25px;
}

/* Labels */
label {
    display: block;
    margin-bottom: 6px;
    font-weight: 600;
    color: #444;
}

/* Inputs */
input,
select {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 8px;
    box-sizing: border-box;
    font-size: 15px;
    transition: 0.3s;
}

/* Focus Effect */
input:focus,
select:focus {
    border-color: #667eea;
    outline: none;
    box-shadow: 0 0 8px rgba(102,126,234,0.3);
}

/* Radio Buttons */
.gender {
    display: flex;
    gap: 20px;
    margin-bottom: 15px;
}

.gender label {
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: normal;
}

/* Checkbox */
.terms {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
}

/* Register Button */
button,
input[type="submit"] {
    width: 100%;
    background: #667eea;
    color: white;
    border: none;
    padding: 12px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover,
input[type="submit"]:hover {
    background: #5a67d8;
    transform: translateY(-2px);
}

/* Mobile Responsive */
@media (max-width: 500px) {
    form {
        width: 90%;
        padding: 25px;
    }
}
</style>

<script>

function validateForm(){

let name = document.getElementById("name").value;
let username = document.getElementById("username").value;
let email = document.getElementById("email").value;
let phone = document.getElementById("phone").value;
let age = document.getElementById("age").value;
let dob = document.getElementById("dob").value;
let password = document.getElementById("password").value;
let confirm = document.getElementById("confirm").value;
let country = document.getElementById("country").value;
let terms = document.getElementById("terms").checked;

let gender = document.getElementsByName("gender");


let namePattern = /^[A-Za-z]+$/;

if(name == ""){
alert("Name is required");
return false;
}

if(!name.match(namePattern)){
alert("Name must contain letters only");
return false;
}


/* Email Validation */

let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

if(!email.match(emailPattern)){
alert("Enter valid email");
return false;
}


/* Phone Validation */

if(isNaN(phone)){
alert("Phone must contain digits only");
return false;
}

if(phone.length != 10){
alert("Phone number must be 10 digits");
return false;
}



if(age < 18){
alert("Age must be 18 or above");
return false;
}


if(dob == ""){
alert("Please select date of birth");
return false;
}



let selected = false;

for(let i=0;i<gender.length;i++){
if(gender[i].checked){
selected = true;
}
}

if(!selected){
alert("Please select gender");
return false;
}


/* Country Validation */

if(country == ""){
alert("Please select country");
return false;
}


/* Password Validation */

let passPattern = /^(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*])/;

if(password.length < 6){
alert("Password must be at least 6 characters");
return false;
}

if(!password.match(passPattern)){
alert("Password must contain uppercase, number and special character");
return false;
}


/* Confirm Password */

if(password != confirm){
alert("Passwords do not match");
return false;
}


/* Terms and Conditions */

if(!terms){
alert("Please accept terms and conditions");
return false;
}

alert("Form submitted successfully");
return true;

}

</script>

</head>

<body>

<h2>Registration Form</h2>

<form onsubmit="return validateForm()">

Name  
<br>
<input type="text" id="name">
<br><br>


Email  
<br>
<input type="text" id="email">
<br><br>

Phone  
<br>
<input type="text" id="phone">
<br><br>

Age  
<br>
<input type="number" id="age">
<br><br>

Date of Birth  
<br>
<input type="date" id="dob">
<br><br>

Gender  
<br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

Country  
<br>
<select id="country">
<option value="">Select Country</option>
<option>Nepal</option>
<option>India</option>
<option>Sweden</option>
<option>Germany</option>
</select>

<br><br>

Password  
<br>
<input type="password" id="password">
<br><br>

Confirm Password  
<br>
<input type="password" id="confirm">
<br><br>

<input type="checkbox" id="terms"> I accept Terms and Conditions

<br><br>

<input type="submit" value="Register">

</form>

</body>
</html>
